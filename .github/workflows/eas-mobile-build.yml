name: EAS mobile build

on:
  workflow_call:
    inputs:
      environment_name:
        description: "GitHub / EAS environment name"
        required: true
        type: string
      profile:
        description: "EAS build profile"
        required: true
        type: string
      platform:
        description: "Target mobile platform"
        required: true
        type: string
    outputs:
      ios_build_id:
        description: "EAS iOS build ID"
        value: ${{ jobs.build.outputs.ios_build_id }}
      ios_build_url:
        description: "EAS iOS artifact URL"
        value: ${{ jobs.build.outputs.ios_build_url }}
      android_build_id:
        description: "EAS Android build ID"
        value: ${{ jobs.build.outputs.android_build_id }}
      android_build_url:
        description: "EAS Android artifact URL"
        value: ${{ jobs.build.outputs.android_build_url }}
      build_ids:
        description: "All EAS build IDs as JSON array"
        value: ${{ jobs.build.outputs.build_ids }}
  workflow_dispatch:
    inputs:
      environment_name:
        description: "GitHub / EAS environment name"
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      platform:
        description: "EAS platform"
        required: true
        default: all
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: "EAS build profile (eas.json)"
        required: true
        default: preview
        type: choice
        options:
          - production
          - preview
          - development

permissions:
  contents: read

concurrency:
  group: eas-mobile-build-${{ github.workflow }}-${{ inputs.environment_name }}-${{ inputs.profile }}-${{ inputs.platform }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    outputs:
      ios_build_id: ${{ steps.extract.outputs.ios_build_id }}
      ios_build_url: ${{ steps.extract.outputs.ios_build_url }}
      android_build_id: ${{ steps.extract.outputs.android_build_id }}
      android_build_url: ${{ steps.extract.outputs.android_build_url }}
      build_ids: ${{ steps.extract.outputs.build_ids }}
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_WEB_APP_HOST: ${{ vars.EXPO_PUBLIC_WEB_APP_HOST }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.7.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install monorepo dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Prepare EAS environment payload
        working-directory: apps/mobile
        run: >
          node ../../scripts/cicd/write-dotenv.mjs
          ".secrets/eas.${{ inputs.environment_name }}.env"
          EXPO_PUBLIC_WEB_APP_HOST
          EXPO_PUBLIC_SUPABASE_URL
          EXPO_PUBLIC_SUPABASE_ANON_KEY

      - name: Sync EAS environment from GitHub
        working-directory: apps/mobile
        run: >
          eas env:push --force
          --environment "${{ inputs.environment_name }}"
          --path ".secrets/eas.${{ inputs.environment_name }}.env"

      - name: Build mobile app on EAS
        working-directory: apps/mobile
        run: >
          eas build
          --platform "${{ inputs.platform }}"
          --profile "${{ inputs.profile }}"
          --non-interactive
          --wait
          --json > eas-build.json

      - name: Extract build outputs
        id: extract
        working-directory: apps/mobile
        run: node ../../scripts/cicd/extract-eas-build-outputs.mjs eas-build.json

      - name: Upload EAS build metadata
        uses: actions/upload-artifact@v4
        with:
          name: eas-build-${{ inputs.environment_name }}-${{ inputs.profile }}-${{ inputs.platform }}
          path: apps/mobile/eas-build.json
