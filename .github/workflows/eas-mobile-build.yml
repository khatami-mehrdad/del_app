name: EAS mobile build

on:
  workflow_call:
    inputs:
      environment_name:
        description: "GitHub / EAS environment name"
        required: true
        type: string
      publish_android_prerelease:
        description: "Publish the preview Android APK to a stable GitHub prerelease"
        required: false
        default: false
        type: boolean
      profile:
        description: "EAS build profile"
        required: true
        type: string
      platform:
        description: "Target mobile platform"
        required: true
        type: string
    outputs:
      ios_build_id:
        description: "EAS iOS build ID"
        value: ${{ jobs.build.outputs.ios_build_id }}
      ios_build_url:
        description: "EAS iOS artifact URL"
        value: ${{ jobs.build.outputs.ios_build_url }}
      android_build_id:
        description: "EAS Android build ID"
        value: ${{ jobs.build.outputs.android_build_id }}
      android_build_url:
        description: "EAS Android artifact URL"
        value: ${{ jobs.build.outputs.android_build_url }}
      android_prerelease_apk_url:
        description: "Stable GitHub prerelease APK URL for preview Android builds"
        value: ${{ jobs.build.outputs.android_prerelease_apk_url }}
      android_prerelease_url:
        description: "Stable GitHub prerelease page URL for preview Android builds"
        value: ${{ jobs.build.outputs.android_prerelease_url }}
      android_blob_apk_url:
        description: "Vercel Blob APK URL (direct download, no redirects)"
        value: ${{ jobs.build.outputs.android_blob_apk_url }}
      build_ids:
        description: "All EAS build IDs as JSON array"
        value: ${{ jobs.build.outputs.build_ids }}
  workflow_dispatch:
    inputs:
      environment_name:
        description: "GitHub / EAS environment name"
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      publish_android_prerelease:
        description: "Publish preview Android APK to the stable GitHub prerelease"
        required: true
        default: true
        type: boolean
      platform:
        description: "EAS platform"
        required: true
        default: all
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: "EAS build profile (eas.json)"
        required: true
        default: preview
        type: choice
        options:
          - production
          - preview
          - development

permissions:
  contents: write

concurrency:
  group: eas-mobile-build-${{ github.workflow }}-${{ inputs.environment_name }}-${{ inputs.profile }}-${{ inputs.platform }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    outputs:
      ios_build_id: ${{ steps.extract.outputs.ios_build_id }}
      ios_build_url: ${{ steps.extract.outputs.ios_build_url }}
      android_build_id: ${{ steps.extract.outputs.android_build_id }}
      android_build_url: ${{ steps.extract.outputs.android_build_url }}
      android_prerelease_apk_url: ${{ steps.publish_preview.outputs.apk_url }}
      android_prerelease_url: ${{ steps.publish_preview.outputs.release_url }}
      android_blob_apk_url: ${{ steps.upload_blob.outputs.blob_url }}
      build_ids: ${{ steps.extract.outputs.build_ids }}
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_WEB_APP_HOST: ${{ vars.EXPO_PUBLIC_WEB_APP_HOST }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.7.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install monorepo dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Prepare EAS environment payload
        working-directory: apps/mobile
        run: >
          node ../../scripts/cicd/write-dotenv.mjs
          ".secrets/eas.${{ inputs.environment_name }}.env"
          EXPO_PUBLIC_WEB_APP_HOST
          EXPO_PUBLIC_SUPABASE_URL
          EXPO_PUBLIC_SUPABASE_ANON_KEY

      - name: Sync EAS environment from GitHub
        working-directory: apps/mobile
        run: >
          eas env:push --force
          --environment "${{ inputs.environment_name }}"
          --path ".secrets/eas.${{ inputs.environment_name }}.env"

      - name: Build mobile app on EAS
        working-directory: apps/mobile
        run: >
          eas build
          --platform "${{ inputs.platform }}"
          --profile "${{ inputs.profile }}"
          --non-interactive
          --wait
          --json > eas-build.json

      - name: Extract build outputs
        id: extract
        working-directory: apps/mobile
        run: node ../../scripts/cicd/extract-eas-build-outputs.mjs eas-build.json

      - name: Upload EAS build metadata
        uses: actions/upload-artifact@v4
        with:
          name: eas-build-${{ inputs.environment_name }}-${{ inputs.profile }}-${{ inputs.platform }}
          path: apps/mobile/eas-build.json

      - name: Publish preview Android APK prerelease
        id: publish_preview
        if: inputs.publish_android_prerelease && inputs.environment_name == 'preview' && steps.extract.outputs.android_build_url != ''
        env:
          GH_TOKEN: ${{ github.token }}
          ANDROID_BUILD_ID: ${{ steps.extract.outputs.android_build_id }}
          ANDROID_BUILD_URL: ${{ steps.extract.outputs.android_build_url }}
          RELEASE_TAG: preview-android-latest
        run: |
          set -euo pipefail

          apk_path="$RUNNER_TEMP/del-preview-android-latest.apk"
          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
          apk_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/del-preview-android-latest.apk"

          curl -L "$ANDROID_BUILD_URL" -o "$apk_path"

          release_notes="$(cat <<EOF
          Latest preview Android APK built by GitHub Actions.

          - Workflow run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - EAS build ID: ${ANDROID_BUILD_ID}
          - Source artifact: ${ANDROID_BUILD_URL}

          Share the attached APK asset for direct install on Android devices.
          EOF
          )"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "Preview Android APK (latest)" \
              --notes "$release_notes" \
              --prerelease
          else
            gh release create "$RELEASE_TAG" "$apk_path#del-preview-android-latest.apk" \
              --title "Preview Android APK (latest)" \
              --notes "$release_notes" \
              --prerelease
          fi

          gh release upload "$RELEASE_TAG" "$apk_path#del-preview-android-latest.apk" --clobber

          {
            echo "release_url=${release_url}"
            echo "apk_url=${apk_url}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload APK to Vercel Blob
        id: upload_blob
        if: inputs.publish_android_prerelease && inputs.environment_name == 'preview' && steps.extract.outputs.android_build_url != ''
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: |
          set -euo pipefail
          apk_path="$RUNNER_TEMP/del-preview-android-latest.apk"
          output=$(npx vercel blob put "$apk_path" \
            --pathname del-preview-android-latest.apk \
            --rw-token "$BLOB_READ_WRITE_TOKEN" 2>&1)
          blob_url=$(echo "$output" | grep -oE 'https://[^ ]+')
          echo "blob_url=${blob_url}" >> "$GITHUB_OUTPUT"

      - name: Publish preview APK summary
        if: steps.publish_preview.outputs.release_url != '' || steps.upload_blob.outputs.blob_url != ''
        run: |
          {
            echo "## Preview Android APK"
            echo
            echo "- GitHub prerelease: ${{ steps.publish_preview.outputs.release_url }}"
            echo "- Direct APK: ${{ steps.publish_preview.outputs.apk_url }}"
            echo "- Vercel Blob: ${{ steps.upload_blob.outputs.blob_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
